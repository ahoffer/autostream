# Log level: debug, info, warn, error
# Change this value and restart to adjust logging verbosity
logLevel: error

# Listener ports are deliberately absent: .env owns them, and entrypoint.sh
# passes them to MediaMTX through its MTX_* config overrides.

# Enable HLS
hls: yes

# Paths configuration
# All videos in /app/videos are automatically discovered and streamed
# by the stream-supervisor.py process
paths:
  all:
    source: publisher
