# Log level: debug, info, warn, error
# Change this value and restart to adjust logging verbosity
logLevel: error

# Protocol listeners. The ports are MediaMTX's own defaults and mirror .env,
# which docker-compose.yml (port mappings) and stream-supervisor.py (URLs,
# readiness check) consume.
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001

# Enable HLS
hls: yes
hlsAddress: :8888

# Paths configuration
# All videos in /app/videos are automatically discovered and streamed
# by the stream-supervisor.py process
paths:
  all:
    source: publisher
