services:
  autostream:
    image: ${CONTAINER_NAME}:${VERSION}
    volumes:
      - ./mediamtx.yml:/app/mediamtx.yml:ro
      - ./videos:/app/videos:ro
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    stop_grace_period: 1s
    # .env is the single source of truth: pass it through whole rather than
    # restating each key here.
    env_file:
      - .env
    ports:
      - "9554:${MEDIAMTX_RTSP_PORT}"       # RTSP
      - "9322:${MEDIAMTX_HLS_PORT}"        # HLS
      - "9000:${MEDIAMTX_RTP_PORT}/udp"    # RTP
      - "9001:${MEDIAMTX_RTCP_PORT}/udp"   # RTCP
      - "9080:${STREAM_API_PORT}"          # Stream Control UI
    networks:
      - octo-cx-network

networks:
  octo-cx-network:
    external: true
